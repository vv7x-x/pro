<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>500 — Server Error</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0B0B0F;--cta:#E10600;--silver:#C0C0C0;--white:#FFFFFF;--border:#1E1E2A}
  body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .code{font-size:clamp(60px,16vw,120px);font-weight:700;background:linear-gradient(135deg,var(--cta) 0%,#FF3B2F 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
  h1{font-size:clamp(22px,4vw,36px);font-weight:600;margin-bottom:12px}
  p{font-size:15px;color:var(--silver);max-width:420px;margin-bottom:36px;line-height:1.6}
  .btn{display:inline-flex;align-items:center;gap:10px;font-family:inherit;font-weight:600;font-size:15px;padding:14px 34px;border-radius:8px;background:var(--cta);color:var(--white);text-decoration:none;transition:transform .25s,box-shadow .25s}
  .btn:hover{transform:translateY(-3px);box-shadow:0 0 32px rgba(225,6,0,.5)}
  .glow{position:fixed;top:-30%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(225,6,0,.08) 0%,transparent 70%);pointer-events:none;z-index:-1}
</style>
</head>
<body>
<div class="glow"></div>
<div class="code">500</div>
<h1>Something went wrong</h1>
<p>An unexpected error occurred. Please try again later.</p>
<a href="/" class="btn">&larr; Back to Home</a>
</body>
</html>
